name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # node:sqlite requires Node 22.5+; use current LTS
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
